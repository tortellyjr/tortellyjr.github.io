<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <title>Grid Test</title>
    </head>
    <body>
        <style>
          *{
              font-family: sans-serif;
              letter-spacing: 1px;
          }
          main{
              padding-top: 1rem;
          }
          img{
              margin: 0px;
          }
          .campeonatos{
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            border: solid 0px red;
          }
          a{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
          }
          article{
            border: solid 1px #dddddd;
            background-color: #f7f7fa;
            border-radius: 0.5rem;
            width: fit-content;
            width: 8rem;
            width: clamp(6rem, 11vw, 8rem);
            padding: 0.5rem;
          }
          article img{
            width: clamp(6rem, 11vw, 8rem);
          }
          article span{
            border: solid 0px red;
            color: #404040;
            font-size: 2.5vw;
            font-size: clamp(1.2rem, 2.2vw, 1.4rem);
            text-align: center;
          }        </style>
        <main>
          <section class="campeonatos">
            <article>
              <a href="https://www.cbf.com.br/futebol-brasileiro/tabelas/copa-do-brasil/masculino/2026/2000">
                <img src="https://tortellyjr.github.io/assets/img/copa_do_brasil.png" alt="">
                <span>Copa do Brasil</span>
              </a>
            </article>
          </section>
        </main>
    </body>
</html>
