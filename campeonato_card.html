<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <title>Grid Test</title>
    </head>
    <body>
        <style>
          *{
              font-family: sans-serif;
              letter-spacing: 1px;
          }
          main{
              padding-top: 1rem;
          }
          img{
              margin: 0px;
          }
          *{
            font-family: sans-serif;
            letter-spacing: 1px;
          }
          .campeonatos{
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            border: solid 1px red;
          }
          a{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
          }
          article{
            border: solid 1px #dddddd;
            border-radius: 0.5rem;
            width: fit-content;
            padding: 0.5rem;
          }
          article img{
            width: 10rem;
          }
          article span{
            color: #707070;
            font-size: 1.2rem;
          }
        </style>
        <main>
          <section class="campeonatos">
            <article>
              <a href="https://www.cbf.com.br/futebol-brasileiro/tabelas/copa-do-brasil/masculino/2026/2000">
                <img src="https://tortellyjr.github.io/assets/img/copa_do_brasil.png" alt="">
                <span>Copa do Brasil</span>
              </a>
            </article>
          </section>
        </main>
    </body>
</html>
