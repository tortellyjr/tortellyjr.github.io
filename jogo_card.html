<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <!_-link rel="stylesheet" href="assets/style/grid6.css"-->
        <title>Grid Test</title>
        <!--script src="assets/script/grid6.js"></script-->
    </head>
    <body>
        <style>
        *{
            font-family: sans-serif;
            letter-spacing: 1px;
        }
        main{
            padding-top: 1rem;
        }
        img{
            margin: 0px;
        }
        .card_jogos{
            padding: 1rem;
            border: solid 1px green;
            background-color: green;
            color: white;
            max-width: 600px;
            margin: auto;
        }
        .card_jogos *{
            padding: 0px;
        }
        .card_jogos .campeonato{
            display: flex;
            border: solid 0px white;
            justify-content: space-between;
            border-bottom: solid 1px darkgreen;
            padding-bottom: 1rem;
            font-size: 80%;
            color: lightyellow;
        }
        .card_jogos .campeonato div{
            border: solid 0px yellow;
            display: flex;
            align-items: center;
        }
        .card_jogos .campeonato div img{
            width: 1.5rem;
            margin-right: 0.2rem;
        }
        .card_jogos .jogo{
            border: solid 0px white;
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .card_jogos .jogo .time{
            border: solid 0px yellow;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            width: 8rem;
        }
        .card_jogos .jogo .time img{
            width: 5rem;
        }
        .card_jogos .jogo .time span{
            text-align: center;
            border: solid 0px yellow;
            flex-grow: 1;
            align-content: center;
        }
        .card_jogos .jogo .versus{
            border: solid 0px white;
            flex-grow: 1;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
        }
        .card_jogos .jogo .versus span:first-of-type, .card_jogos .jogo .versus span:last-of-type{
            border: solid 0px white;
            text-align: center;
            font-size: 500%;
            font-weight: bold;
        }
        .card_jogos .data_local{
            border: solid 0px white;
            border-top: solid 1px darkgreen;
            padding-top: 1rem;
            font-size: 80%;
            color: lightyellow;
        }
        .card_jogos .data_local span{
            border: solid 0px yellow;
            display: block;
            width: 100%;
            text-align: center;
        }
        </style>
        <main>
          <article class="card_jogos">
            <section class="campeonato">
              <div>
                <img src="https://tortellyjr.github.io/assets/img/copa_do_brasil.png"><span>Copa do Brasil</span>
              </div>
              <div class="fase">Quartas de Final</div>
            </section>
            <section class="jogo">
              <div class="time">
                <img src="https://tortellyjr.github.io/assets/img/asa.png">
                <span>Asa-AL</span>
              </div>
              <div class="versus">
                <span>1</span>
                <span>X</span>
                <span>1</span>
              </div>
              <div class="time">
                <img src="https://tortellyjr.github.io/assets/img/azuriz.png">
                <span>Azuriz-PR</span>
              </div>
            </section>
            <section class="data_local">
              <span>Maracanã - 25/04/2026 - 19:00</span>
            </section>
          </article>
        </main>
    </body>
</html>
